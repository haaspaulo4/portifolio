<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Paulo</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Admin-only styles (complementam style.css) */
    .admin-shell { max-width: 1100px; margin: 0 auto; padding: 6rem 1.5rem 3rem; }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
      border-bottom: 1px solid var(--green-dim, #1f3);
      padding-bottom: 1rem;
    }
    .admin-header h1 { font-size: 1.25rem; color: var(--green, #00ff41); }
    .admin-header .session-info { font-size: 0.85rem; color: #888; }
    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .admin-tabs button {
      background: transparent; color: var(--green, #00ff41);
      border: 1px solid var(--green-dim, #1f3);
      padding: 0.5rem 1rem; font-family: inherit; cursor: pointer;
    }
    .admin-tabs button.active { background: var(--green, #00ff41); color: #000; }
    .admin-tabs button:hover:not(.active) { border-color: var(--green, #00ff41); }
    .login-card {
      max-width: 420px; margin: 6rem auto; padding: 2rem;
      border: 1px solid var(--green-dim, #1f3); background: #0a0a0a;
    }
    .login-card h2 { margin-bottom: 1.5rem; color: var(--green, #00ff41); }
    .form-row { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .form-row label { font-size: 0.85rem; color: #888; }
    .form-row input {
      background: #000; color: var(--green, #00ff41);
      border: 1px solid var(--green-dim, #1f3);
      padding: 0.6rem; font-family: inherit; font-size: 0.95rem;
    }
    .form-row input:focus { outline: 1px solid var(--green, #00ff41); }
    .form-error { color: #ff5555; font-size: 0.85rem; min-height: 1.2em; margin-bottom: 0.5rem; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .admin-table th, .admin-table td {
      border: 1px solid #1a3a1a; padding: 0.5rem 0.75rem; text-align: left;
    }
    .admin-table th { background: #0a1a0a; color: var(--green, #00ff41); }
    .admin-table tr:hover td { background: #0a1a0a; }
    .admin-table .empty-row td { text-align: center; color: #888; padding: 2rem; }
    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; font-size: 0.75rem;
      border: 1px solid currentColor;
    }
    .badge.pending { color: #ffaa00; }
    .badge.confirmed { color: #00ff41; }
    .badge.cancelled { color: #ff5555; }
    .row-actions { display: flex; gap: 0.5rem; }
    .row-actions button {
      background: transparent; border: 1px solid #444; color: #ccc;
      padding: 0.25rem 0.5rem; font-family: inherit; font-size: 0.75rem; cursor: pointer;
    }
    .row-actions button:hover { border-color: var(--green, #00ff41); color: var(--green, #00ff41); }
    .row-actions button.danger:hover { border-color: #ff5555; color: #ff5555; }
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .metric-card {
      border: 1px solid var(--green-dim, #1f3); padding: 1.25rem;
      background: #0a0a0a;
    }
    .metric-card .value {
      font-size: 1.75rem; color: var(--green, #00ff41); margin-bottom: 0.25rem;
    }
    .metric-card .label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
    .logout-btn {
      background: transparent; color: #ff5555; border: 1px solid #ff5555;
      padding: 0.4rem 0.9rem; font-family: inherit; cursor: pointer;
    }
    .logout-btn:hover { background: #ff5555; color: #000; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main class="admin-shell">

    <!-- ============================================ -->
    <!-- TELA DE LOGIN                                -->
    <!-- ============================================ -->
    <div id="login-screen" class="login-card">
      <h2>./login --admin</h2>
      <form id="login-form" autocomplete="on">
        <div class="form-row">
          <label for="login-email">email</label>
          <input type="email" id="login-email" required autocomplete="username">
        </div>
        <div class="form-row">
          <label for="login-password">senha</label>
          <input type="password" id="login-password" required autocomplete="current-password">
        </div>
        <p id="login-error" class="form-error" role="alert" aria-live="polite"></p>
        <button type="submit" class="btn btn-primary" style="width:100%">[ ENTRAR ]</button>
      </form>
      <p style="margin-top:1.5rem;font-size:0.75rem;color:#666;">
        Acesso restrito. Tentativas são logadas.
      </p>
    </div>

    <!-- ============================================ -->
    <!-- DASHBOARD                                    -->
    <!-- ============================================ -->
    <div id="dashboard" hidden>
      <header class="admin-header">
        <div>
          <h1>paulo@admin:~$</h1>
          <p class="session-info" id="session-info">--</p>
        </div>
        <button class="logout-btn" id="logout-btn">[ LOGOUT ]</button>
      </header>

      <nav class="admin-tabs" role="tablist">
        <button data-tab="bookings"  class="active" role="tab">[ Agendamentos ]</button>
        <button data-tab="leads"     role="tab">[ Leads ]</button>
        <button data-tab="analytics" role="tab">[ Analytics ]</button>
      </nav>

      <section id="tab-bookings" role="tabpanel"></section>
      <section id="tab-leads"    role="tabpanel" hidden></section>
      <section id="tab-analytics" role="tabpanel" hidden></section>
    </div>

  </main>

  <script type="module">
    // =====================================================
    // CONFIGURAÇÃO (público por design — anon key é rotacionável,
    // RLS no Supabase protege os dados)
    // =====================================================
    const SUPABASE_URL = 'https://egioyhrdbmhvmblgwvpi.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_23t3IDTe7sOuP4wee1q0IA_1tvjDxD1'

    const { createClient } = await import(
      'https://esm.sh/@supabase/supabase-js@2.39.8'
    )
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    })

    // =====================================================
    // AUTH STATE
    // =====================================================
    const $login   = document.getElementById('login-screen')
    const $dash    = document.getElementById('dashboard')
    const $err     = document.getElementById('login-error')
    const $info    = document.getElementById('session-info')

    function showLogin() {
      $dash.hidden = true
      $login.hidden = false
    }
    function showDashboard(session) {
      $login.hidden = true
      $dash.hidden = false
      $info.textContent = `logado: ${session.user.email} • expira ${new Date(session.expires_at * 1000).toLocaleTimeString('pt-BR')}`
    }

    // Verifica sessão existente ao carregar
    const { data: { session: initialSession } } = await supabase.auth.getSession()
    if (initialSession) showDashboard(initialSession)
    else showLogin()

    // Reage a mudanças (login, logout, refresh)
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session) {
        showDashboard(session)
        loadTab(currentTab)
      } else {
        showLogin()
      }
    })

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      $err.textContent = ''
      const email    = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) $err.textContent = error.message
    })

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut()
    })

    // =====================================================
    // TABS
    // =====================================================
    let currentTab = 'bookings'

    document.querySelectorAll('.admin-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentTab = btn.dataset.tab
        document.querySelectorAll('[role="tabpanel"]').forEach(s => s.hidden = true)
        document.getElementById(`tab-${currentTab}`).hidden = false
        loadTab(currentTab)
      })
    })

    // =====================================================
    // RENDERIZAÇÃO (XSS-safe: usa textContent/createElement)
    // =====================================================
    function escapeHtml(s) {
      if (s == null) return ''
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    }

    function el(tag, attrs = {}, ...children) {
      const node = document.createElement(tag)
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') node.className = v
        else if (k === 'onClick') node.addEventListener('click', v)
        else if (k === 'data') node.dataset[v[0]] = v[1]
        else node.setAttribute(k, v)
      }
      for (const c of children) {
        if (c == null) continue
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c)
      }
      return node
    }

    function formatDate(iso) {
      if (!iso) return '—'
      try { return new Date(iso).toLocaleString('pt-BR') }
      catch { return iso }
    }

    // =====================================================
    // TABELA GENÉRICA
    // =====================================================
    function renderTable(container, columns, rows, actions = []) {
      container.innerHTML = ''
      const table = el('table', { class: 'admin-table' })
      const thead = el('thead')
      const trh = el('tr')
      for (const col of columns) trh.appendChild(el('th', {}, col.label))
      if (actions.length) trh.appendChild(el('th', {}, 'ações'))
      thead.appendChild(trh)
      table.appendChild(thead)

      const tbody = el('tbody')
      if (!rows || rows.length === 0) {
        const tr = el('tr', { class: 'empty-row' })
        tr.appendChild(el('td', { colspan: String(columns.length + (actions.length ? 1 : 0)) }, 'Nenhum registro.'))
        tbody.appendChild(tr)
      } else {
        for (const row of rows) {
          const tr = el('tr')
          for (const col of columns) {
            let val = typeof col.render === 'function' ? col.render(row) : row[col.key]
            if (val instanceof Node) tr.appendChild(el('td', {}, val))
            else tr.appendChild(el('td', {}, val == null ? '—' : String(val)))
          }
          if (actions.length) {
            const td = el('td')
            const wrap = el('div', { class: 'row-actions' })
            for (const a of actions) {
              const btn = el('button', {
                class: a.danger ? 'danger' : '',
                onClick: () => a.onClick(row)
              }, a.label)
              wrap.appendChild(btn)
            }
            td.appendChild(wrap)
            tr.appendChild(td)
          }
          tbody.appendChild(tr)
        }
      }
      table.appendChild(tbody)
      container.appendChild(table)
    }

    // =====================================================
    // LOADERS
    // =====================================================
    async function loadTab(tab) {
      const $section = document.getElementById(`tab-${tab}`)
      $section.innerHTML = '<p style="color:#888">carregando...</p>'
      try {
        if (tab === 'bookings')  await loadBookings($section)
        if (tab === 'leads')     await loadLeads($section)
        if (tab === 'analytics') await loadAnalytics($section)
      } catch (err) {
        $section.innerHTML = ''
        $section.appendChild(el('p', { style: 'color:#ff5555' }, `Erro: ${escapeHtml(err.message || String(err))}`))
      }
    }

    async function loadBookings($section) {
      const { data, error } = await supabase
        .from('bookings')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(100)
      if (error) throw error
      renderTable($section,
        [
          { key: 'nome',      label: 'nome' },
          { key: 'email',     label: 'email' },
          { key: 'empresa',   label: 'empresa' },
          { key: 'mensagem',  label: 'mensagem' },
          { key: 'created_at', label: 'criado em', render: r => formatDate(r.created_at) }
        ],
        data,
        [
          { label: 'apagar', danger: true, onClick: r => deleteRow('bookings', r.id, () => loadTab('bookings')) }
        ]
      )
    }

    async function loadLeads($section) {
      const { data, error } = await supabase
        .from('leads')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(100)
      if (error) throw error
      renderTable($section,
        [
          { key: 'nome',      label: 'nome' },
          { key: 'email',     label: 'email' },
          { key: 'telefone',  label: 'telefone' },
          { key: 'origem',    label: 'origem' },
          { key: 'created_at', label: 'criado em', render: r => formatDate(r.created_at) }
        ],
        data,
        [
          { label: 'apagar', danger: true, onClick: r => deleteRow('leads', r.id, () => loadTab('leads')) }
        ]
      )
    }

    async function loadAnalytics($section) {
      const { data, error } = await supabase
        .from('analytics')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(500)
      if (error) throw error

      // Métricas agregadas
      const total = data?.length || 0
      const byEvent = {}
      const byDay = {}
      for (const ev of (data || [])) {
        byEvent[ev.event] = (byEvent[ev.event] || 0) + 1
        const day = (ev.created_at || '').slice(0, 10)
        if (day) byDay[day] = (byDay[day] || 0) + 1
      }
      const todayCount = byDay[new Date().toISOString().slice(0, 10)] || 0

      $section.innerHTML = ''
      const grid = el('div', { class: 'metrics-grid' })
      grid.appendChild(metricCard(total,    'eventos totais'))
      grid.appendChild(metricCard(todayCount, 'eventos hoje'))
      grid.appendChild(metricCard(Object.keys(byEvent).length, 'tipos de evento'))
      $section.appendChild(grid)

      const top = Object.entries(byEvent).sort((a, b) => b[1] - a[1])
      const evTable = el('div')
      renderTable(evTable,
        [
          { label: 'evento', render: r => r.event },
          { label: 'count',  render: r => r.count }
        ],
        top.map(([event, count]) => ({ event, count })),
        []
      )
      $section.appendChild(el('h3', { style: 'color:var(--green);margin:1.5rem 0 0.5rem' }, 'Eventos por tipo'))
      $section.appendChild(evTable)
    }

    function metricCard(value, label) {
      return el('div', { class: 'metric-card' },
        el('div', { class: 'value' }, String(value)),
        el('div', { class: 'label' }, label)
      )
    }

    async function deleteRow(table, id, reload) {
      if (!confirm(`Apagar registro ${id} de ${table}?`)) return
      const { error } = await supabase.from(table).delete().eq('id', id)
      if (error) { alert('Erro: ' + error.message); return }
      reload()
    }

    // =====================================================
    // INICIAL
    // =====================================================
    if (initialSession) loadTab(currentTab)
  </script>
</body>
</html>
